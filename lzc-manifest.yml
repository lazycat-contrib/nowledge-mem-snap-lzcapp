application:
  subdomain: nowledge-mem-snap
  oidc_redirect_path: /auth/oidc/callback
  upstreams:
    - location: /
      backend: http://nowledge-mem-snap:14335/
  public_path:
    - /
  injects:
    - id: login-autofill
      when:
        - /login
      do:
        - src: builtin://simple-inject-password
          params:
            user: "{{ .U.admin_username }}"
            password: "{{ .U.admin_password }}"

services:
  nowledge-mem-snap:
    # czyt/nowledge-mem-snap:v0.2.5
    image: registry.lazycat.cloud/czyt/czyt/nowledge-mem-snap:588a01b8b8a76699
    user: root
    environment:
      - DATA_DIR=/app/data
      - PORT=14335
      - TZ={{.U.tz}}
      - NMEM_SNAP_ADMIN_USERNAME={{.U.admin_username}}
      - NMEM_SNAP_ADMIN_PASSWORD={{.U.admin_password}}
      - NMEM_SNAP_SESSION_SECRET={{.U.session_secret}}
      - NMEM_SNAP_LOG_LEVEL=info
      - NMEM_SNAP_LOG_FILE=/app/data/logs/nowledge-mem-snap.log
      - NMEM_SNAP_LOG_MAX_SIZE_MB=20
      - NMEM_SNAP_LOG_MAX_BACKUPS=7
      - NMEM_SNAP_LOG_MAX_AGE_DAYS=30
      - NMEM_SNAP_LOG_COMPRESS=true
      - NMEM_API_URL={{.U.nmeme_api_url}}
      - NMEM_API_KEY={{.U.nmeme_api_key}}
      # OIDC — Issuer/Client ID/Secret/Redirect 由懒猫平台自动注入
      - NMEM_SNAP_OIDC_ENABLED={{.U.oidc_enabled}}
      - NMEM_SNAP_OIDC_ISSUER_URL=${LAZYCAT_AUTH_OIDC_ISSUER_URI}
      - NMEM_SNAP_OIDC_CLIENT_ID=${LAZYCAT_AUTH_OIDC_CLIENT_ID}
      - NMEM_SNAP_OIDC_CLIENT_SECRET=${LAZYCAT_AUTH_OIDC_CLIENT_SECRET}
      - NMEM_SNAP_OIDC_REDIRECT_URL=https://${LAZYCAT_APP_DOMAIN}/auth/oidc/callback
      - NMEM_SNAP_OIDC_ALLOWED_DOMAINS={{.U.oidc_allowed_domains}}
    healthcheck:
      test:
        - CMD
        - wget
        - --no-verbose
        - --tries=1
        - --spider
        - http://localhost:14335/healthz
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    binds:
      - /lzcapp/var/data:/app/data
