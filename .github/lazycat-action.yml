version: 1

project:
  root: .
  build_config: lzc-build.yml
  package_file: package.yml
  output: dist/nowledge-mem-snap.lpk

update:
  strategy: publish
  allow_downgrade: false
  version_source:
    type: image
    image: nowledge-mem-snap

build:
  run_buildscript: false

images:
  - id: nowledge-mem-snap
    target: service
    service: nowledge-mem-snap
    source: docker.io/czyt/nowledge-mem-snap
    channel: stable
    tag_regex: '^v\d+\.\d+\.\d+$'
    version_regex: '^v(?P<version>\d+\.\d+\.\d+)$'
    delivery:
      mode: lazycat

stores:
  official:
    enabled: true
    skip_if_version_exists: true
    create_if_missing: false
    changelog_locales: [zh, en]
  private:
    enabled: true
    skip_if_version_exists: true
    name: Nowledge Mem Snap
    summary: Published from GitHub Actions
